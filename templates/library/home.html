{% extends "library/_layout.html" %}
{% block library_content %}
<section class="hero-band compact" style="background-image:url('{{ url_for('static', filename='images/cafe-front.jpeg') }}')">
  <div class="hero-overlay">
    <h2>Library Operations</h2>
    <p>Memberships, issues, returns, subscriptions, and payments.</p>
  </div>
</section>
<section class="stats">
  <article class="metric"><h3><a href="{{ url_for('library.loans', status='issued') }}">Active Issues</a></h3><p>{{ active_loans }}</p></article>
  <article class="metric"><h3><a href="{{ url_for('library.loans', status='due_tomorrow') }}">Due Tomorrow</a></h3><p>{{ due_tomorrow }}</p></article>
  <article class="metric"><h3><a href="{{ url_for('library.members', status='active') }}">Members</a></h3><p>{{ members }}</p></article>
</section>
{% endblock %}
